services:
  db:
    image: postgres:16
    container_name: hoshidori-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hoshidori
      POSTGRES_USER: hoshidori
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: python:3.12-slim
    container_name: hoshidori-app
    working_dir: /app
    restart: unless-stopped
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "1"
      SECRET_KEY: dev-secret-key
      DATABASE_URL: postgres://hoshidori:password@db:5432/hoshidori
    depends_on:
      - db
    command: >
      bash -lc "
      apt-get update &&
      apt-get install -y --no-install-recommends gcc libpq-dev &&
      pip install --upgrade pip &&
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi &&
      python3 manage.py migrate &&
      python3 manage.py runserver 0.0.0.0:8000
      "

volumes:
  postgres_data: