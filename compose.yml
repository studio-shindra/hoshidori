services:
  db:
    image: postgres:16
    container_name: hoshidori-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hoshidori
      POSTGRES_USER: hoshidori
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: